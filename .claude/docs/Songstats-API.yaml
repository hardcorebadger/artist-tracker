      responses:
        '200':
          $ref: '#/components/responses/Artist-Info'
        '400':
          description: 'Bad Request: The request could not be understood due to malformed syntax.'
        '401':
          description: 'Unauthorized: The request requires valid user authentication.'
        '403':
          description: 'Forbidden: The server understood the request, but is refusing to fulfill it.'
        '404':
          description: 'Not Found: The requested resource could not be found.'
        '429':
          description: 'Too Many Requests: Rate limiting has been applied.'
        '500':
          description: 'Internal Server Error: You should never receive this error because our clever coders catch them all… but if you are unlucky enough to get one, please report it to us.'
        '502':
          description: 'Bad Gateway: The server received an invalid response from the upstream server.'
        '503':
          description: 'Service Unavailable: The server is temporarily unable to handle the request.'
