openapi: 3.1.0
info:
  title: Songstats API
  version: '1.0'
  license:
    name: MIT
    url: 'https://opensource.org/licenses/MIT'
  summary: Enterprise Access to Music Data across all DSPs
  description: |-
    ### Enterprise Access to Music Data across all DSPs

    Based on simple REST principles, the Songstats API endpoints return JSON data about music
    artists, labels, and tracks, directly from the Songstats database.

    The API provides a set of endpoints, each with its own unique path. To access data through the API, an application must authorize itself via a dedicated API Key.

    The Songstats API is based on REST principles. Data resources are accessed via standard HTTPS requests in UTF-8 format to an API endpoint.


    ### General Principles

    The Songstats API does a lot of the work in the background for you. From automatically aggregating track links, to matching metadata and prioritizing the data collection of recently fetched tracks. Some general principles apply:

    - When requesting a new song for the first time via ISRC or SpotifyID that is not yet in the database, Songstats will automatically search for the track links across all platforms and add them. When requesting the song the next time, all aggregated data will start to show up. 

    - Historic Playlist & Chart information is available for every track no matter when they got added. For all resource specific statistics, like follower numbers, stream counts and popularity, historic data will be collected from the date they first got added to the database.

    - If a particular resource was requested once within the last 30 days, it will be flagged as "relevant" in our system and updated more frequently to provide the most recent insights.

    ### Rate Limiting

    Rate Limiting enables the Songstats API to share access bandwidth to its resources equally across all users. Rate limiting is applied as per application based on its API Key. The general rate limit per API Key is 10 requests per second, running a max of 10 concurrent requests at once.

    By default, each exact resource (specific tracks, artists, labels, etc) can be requested 1000 times during a 30 day period. If the API returns status code 429, it means that you have sent too many requests to the same resource.

    ### Uptime Status

    You can check the current uptime status and service updates at: https://status.songstats.com/

    ### Authentication

    Making authorized requests to the Songstats API requires a valid API Key. You can request an API Key by contacting [api@songstats.com](mailto:api@songstats.com). Never publicly share your API Key.

    By using the Songstats Enterprise API, you accept the [Songstats Terms of Service](https://songstats.com/terms-of-service).
  contact:
    name: API Support
    email: api@songstats.com
    url: 'https://songstats.com'
  termsOfService: 'https://songstats.com/terms-of-service'
servers:
  - url: 'https://api.songstats.com/enterprise/v1'
