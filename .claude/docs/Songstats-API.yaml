  parameters:
    add-link:
      name: link
      in: query
      required: true
      schema:
        type: string
        example: 'https://soundcloud.com/dontblink/vibration'
      description: Link to be added.
    tier:
      name: tier
      in: query
      schema:
        type: integer
        default: 4
        example: 4
        maximum: 4
        minimum: 1
      description: Filter Activities by importance. Tier 4 is the lowest tier that returns all activities. Tier 1 is the highest tier that returns only the most significant activities.
    milestones:
      name: milestones
      in: query
      schema:
        type: boolean
        example: true
        default: true
      description: Include Milestone Activities.
    comments:
      name: comments
      in: query
      schema:
        type: boolean
        example: true
        default: true
      description: Include Comment Activities.
    editorial:
      name: editorial
      in: query
      schema:
        type: boolean
        example: false
        default: false
      description: Only include Editorial Activities.
    metric:
      name: metric
      in: query
      schema:
        type: string
        example: playlists
      description: The metric to sort the top results by.
      required: true
    scope:
      name: scope
      in: query
      schema:
        type: string
        example: total
      description: The time scope for the returned top results.
      required: true
    recent:
      name: recent
      in: query
      schema:
        type: boolean
        example: false
        default: false
      description: Only include Activities for recent tracks (released in past 3 months).
    albums:
      name: albums
      in: query
      schema:
        type: boolean
        example: true
        default: true
      description: Include Album Activities.
    delete-link:
      name: link
      in: query
      schema:
        type: string
        example: 'https://soundcloud.com/dontblink/vibration'
      description: Link to be deleted.
      required: true
    isrc:
      name: isrc
      in: query
      required: false
      schema:
        type: string
        example: GBAYE2100626
      description: The ISRC of the track being requested *
    songstats_track_id:
      name: songstats_track_id
      in: query
      schema:
        type: string
        example: k4bp9etx
      description: The Songstats ID of the track being requested *
    country_code:
      name: country_code
      in: query
      schema:
        type: string
        example: US
      description: A two-letter country code
      required: true
    apple_music_track_id:
      name: apple_music_track_id
      in: query
      required: false
      schema:
        type: integer
        example: 1567644047
      description: The Apple Music ID of the track being requested *
    spotify_track_id:
      name: spotify_track_id
      in: query
      required: false
      schema:
        type: string
        example: 1YLGtZjDKyY0Qkv4QlX31b
      description: The Spotify ID of the track being requested *
    source:
      name: source
      in: query
      schema:
        type: string
        example: 'spotify,apple_music,deezer'
      description: Specifies the sources that data is being requested for. Can be a comma separated list of individual sources or be set to 'all'.
      required: true
    limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        example: 20
      description: Specifies the limit of results being returned.
    offset:
      name: offset
      in: query
      schema:
        type: integer
        example: 20
      description: Specifies the offset of the limited results being returned.
    only_current:
      name: only_current
      in: query
      schema:
        type: boolean
        example: true
      description: Only return the playlists and charts the track is currently positioned in.
    with_links:
      name: with_links
      in: query
      schema:
        type: boolean
        example: true
      description: Includes an array of all of the source links associated with the requested objected.
    with_playlists:
      name: with_playlists
      in: query
      schema:
        type: boolean
        example: true
      description: Includes an array of all of the playlists associated to the track.
    with_aggregates:
      name: with_aggregates
      in: query
      schema:
        type: boolean
        example: true
      description: 'Includes data points aggregated by Songstats like playlists_current, playlists_reach_current, charts_current, etc.'
    with_charts:
      name: with_charts
      in: query
      schema:
        type: boolean
        example: true
      description: Includes an array of all of the charts associated to the track.
    with_videos:
      name: with_videos
      in: query
      schema:
        type: boolean
        example: true
      description: Includes an array of all of the videos currently associated to the track.
    with_stations:
      name: with_stations
      in: query
      schema:
        type: boolean
        example: true
      description: Includes an array of all of the radio stations currently associated to the track.
    start_date:
      name: start_date
      in: query
      schema:
        type: string
        format: date
        example: '2021-12-31'
      description: Specifies the start_date of the historic data that is being requested.
    end_date:
      name: end_date
      in: query
      schema:
        type: string
        example: '2022-01-16'
        format: date
      description: Specifies the end_date of the historic data that is being requested.
    songstats_artist_id:
      name: songstats_artist_id
      in: query
      required: false
      schema:
        type: string
        example: pod5zlug
      description: The Songstats ID of the artist being requested *
    songstats_label_id:
      name: songstats_label_id
      in: query
      required: false
      schema:
        type: string
        example: 7gk4yfc9
      description: The Songstats ID of the label being requested *
    spotify_artist_id:
      name: spotify_artist_id
      in: query
      required: false
      schema:
        type: string
        example: 28j8lBWDdDSHSSt5oPlsX2
      description: The Spotify ID of the artist being requested *
    apple_music_artist_id:
      name: apple_music_artist_id
      in: query
      required: false
      schema:
        type: integer
        example: 261545033
      description: The Apple Music ID of the artist being requested *
    beatport_label_id:
      name: beatport_label_id
      in: query
      schema:
        type: string
        example: '74932'
      description: The Beatport ID of the label being requested *
    search:
      name: q
      in: query
      schema:
        type: string
      description: Search Query
      required: true
    accept-encoding:
      name: Accept-Encoding
      in: header
      schema:
        type: string
        example: 'gzip, deflate, br'
      description: 'gzip, deflate, br'
    tidal_artist_id:
      name: tidal_artist_id
      in: query
      required: false
      schema:
        type: string
        example: '49475872'
      description: The TIDAL ID of the collaborator being requested *
    songstats_collaborator_id:
      name: songstats_collaborator_id
      in: query
      required: false
      schema:
        type: string
        example: vkwh40ql
      description: The Songstats ID of the collaborator being requested *
security:
  - apikey: []
